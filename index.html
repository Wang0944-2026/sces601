<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上岐國小601電子聯絡簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(to bottom right, #eff6ff, #e0e7ff);
            min-height: 100vh;
            padding: 1rem;
        }

        .homework-item {
            transition: all 0.3s ease;
        }
        .homework-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .sync-indicator {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .saving-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .saving-dialog {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            min-width: 300px;
        }
        .date-picker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .date-picker-dialog {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .date-picker-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .date-picker-input:focus {
            border-color: #6366f1;
        }
        .homework-confirmed {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border: 2px solid #10b981;
        }
        .homework-pending {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
        }
        .homework-editing {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border: 2px solid #6b7280;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-confirmed {
            background-color: #10b981;
            color: white;
        }
        .status-pending {
            background-color: #f59e0b;
            color: white;
        }
        .status-editing {
            background-color: #6b7280;
            color: white;
        }
        
        /* 拖拽排序樣式 */
        .sortable-item {
            cursor: move;
            transition: all 0.2s ease;
        }
        
        .sortable-item:hover {
            transform: translateY(-1px);
        }
        
        .sortable-item.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
            z-index: 1000;
        }
        
        .sortable-item.drag-over {
            border-top: 3px solid #6366f1;
        }
        
        .drag-handle {
            cursor: grab;
            color: #9ca3af;
            transition: color 0.2s;
        }
        
        .drag-handle:hover {
            color: #6366f1;
        }
        
        .drag-handle:active {
            cursor: grabbing;
        }
        
        .sort-mode-indicator {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 8px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 600;
            color: #92400e;
        }
        
        /* 跑馬燈動畫 */
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-10%); }
        }
        .marquee-wrapper {
            overflow: hidden;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .marquee-content {
            display: flex;
            white-space: nowrap;
            animation: scroll 20s linear infinite; 
        }
        .marquee-wrapper:hover .marquee-content {
            animation-play-state: paused;
        }
    </style>
</head>
<body>
    
    <div class="max-w-4xl mx-auto">
        <div class="mb-4 text-center">
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-indigo-800 mb-2 md:mb-3">📚 上岐國小601聯絡簿</h1>
            <div class="text-sm sm:text-base md:text-lg font-medium flex items-center justify-center gap-1.5 sm:gap-2 flex-wrap" id="dateInfo">
                <span class="bg-red-100 text-red-800 px-2 sm:px-3 py-1 rounded-full" id="semesterInfo">114學年第一學期</span>
                <span class="bg-blue-100 text-blue-800 px-2 sm:px-3 py-1 rounded-full" id="weekInfo">第1週</span>
                <button onclick="showDatePicker()" class="bg-green-100 hover:bg-green-200 text-green-800 px-2 sm:px-3 py-1 rounded-full transition-colors cursor-pointer font-medium" id="dateOnly" title="點擊選擇日期">2025年9月2日</button>
                <span class="bg-purple-100 text-purple-800 px-2 sm:px-3 py-1 rounded-full" id="weekdayOnly">星期二</span>
            </div>
            
            <div class="flex flex-wrap gap-2 sm:gap-3 justify-center mt-4">
                <button onclick="previousDay()" class="group relative bg-gradient-to-r from-slate-500 to-slate-600 hover:from-slate-600 hover:to-slate-700 text-white px-4 py-2 sm:px-6 sm:py-3 rounded-xl font-medium transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl flex items-center space-x-1 sm:space-x-2 text-sm sm:text-base">
                    <span class="text-base sm:text-lg group-hover:animate-pulse">⬅️</span>
                    <span>前一天</span>
                    <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 rounded-xl transition-opacity duration-300"></div>
                </button>
                <button onclick="today()" class="group relative bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white px-4 py-2 sm:px-6 sm:py-3 rounded-xl font-medium transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl flex items-center space-x-1 sm:space-x-2 text-sm sm:text-base">
                    <span class="text-base sm:text-lg group-hover:animate-bounce">📅</span>
                    <span>今天</span>
                    <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 rounded-xl transition-opacity duration-300"></div>
                </button>
                <button onclick="nextDay()" class="group relative bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white px-4 py-2 sm:px-6 sm:py-3 rounded-xl font-medium transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl flex items-center space-x-1 sm:space-x-2 text-sm sm:text-base">
                    <span>後一天</span>
                    <span class="text-base sm:text-lg group-hover:animate-pulse">➡️</span>
                    <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 rounded-xl transition-opacity duration-300"></div>
                </button>
            </div>
        </div>
    
        <div id="countdownMarquee" style="display: none;" class="max-w-4xl mx-auto mt-2 mb-4 bg-yellow-50 border-2 border-yellow-200 rounded-xl shadow-sm py-1.5 px-2 sm:px-4 marquee-wrapper cursor-default" title="將滑鼠移至上方可暫停跑馬燈">
            <div class="marquee-content text-base sm:text-lg font-bold text-yellow-800" id="marqueeText">
            </div>
        </div>
    
        <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6 md:p-8 mb-6">
            <div class="mb-4 sm:mb-8">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-4 mb-4 sm:mb-6">
                    <div class="flex items-center flex-wrap gap-2">
                        <span class="text-xl sm:text-2xl shrink-0">📝</span>
                        <h2 class="font-bold text-gray-800 text-xl sm:text-2xl">今日作業</h2>
    
                        <div id="syncIndicator" class="ml-2 flex items-center space-x-1 sm:space-x-2" style="display: none;">
                            <div class="w-2 h-2 sm:w-3 sm:h-3 bg-blue-500 rounded-full sync-indicator"></div>
                            <span class="text-xs sm:text-sm text-blue-600 font-medium">同步中...</span>
                        </div>
                        <button onclick="forceReloadHomework()" class="ml-2 bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 sm:px-3 sm:py-1 rounded-lg text-xs sm:text-sm font-medium transition-colors flex items-center space-x-1" title="重新載入雲端資料">
                            <span class="text-xs sm:text-sm">🔄</span>
                            <span>重新載入</span>
                        </button>
                    </div>
                    <button id="editModeBtn" onclick="toggleEditMode()" class="w-full sm:w-auto relative group bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-4 py-2 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform sm:hover:scale-105 flex justify-center items-center space-x-2" title="編輯作業">
                        <span data-role="btn-content" class="flex items-center space-x-2">
                            <span id="editIcon" class="text-lg">🔐</span>
                            <span id="editText" class="font-medium text-sm">編輯模式</span>
                        </span>
                        <span data-role="spinner" class="hidden absolute inset-0 flex items-center justify-center gap-2">
                            <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                            <span class="text-sm">儲存中...</span>
                        </span>
                        <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 rounded-xl transition-opacity duration-300"></div>
                    </button>
                </div>
                
                <div id="homeworkContainer" class="space-y-4">
                    <div id="sortModeIndicator" class="sort-mode-indicator" style="display: none;">
                        🔄 拖拽排序模式：拖動作業項目來調整順序
                    </div>
                    
                    <div id="confirmedSection">
                        <div id="confirmedList" class="space-y-3">
                        </div>
                    </div>
                    
                    <div id="editingSection" style="display: none;">
                        <div class="flex items-center mb-3">
                            <div class="h-px bg-gray-300 flex-1"></div>
                            <span class="px-3 text-sm font-medium text-gray-700 bg-gray-100 rounded-full">編輯中作業</span>
                            <div class="h-px bg-gray-300 flex-1"></div>
                        </div>
                        <div id="editingList" class="space-y-3">
                        </div>
                    </div>
                    
                    <div id="loadingState" class="text-center py-12 text-gray-500" style="display: none;">
                        <div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-lg font-medium mb-2">載入中...</p>
                        <p class="text-sm">正在讀取作業資料</p>
                    </div>
                    
                    <div id="emptyState" class="text-center py-12 text-gray-500">
                        <span class="text-6xl mb-4 block">📝</span>
                        <p class="text-xl font-medium mb-2">老師指派作業中...</p>
                    </div>
                </div>
    
                <button id="addHomeworkBtn" onclick="addHomework()" class="mt-6 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-6 py-3 rounded-xl font-medium transition-all duration-300 transform hover:scale-105 flex items-center shadow-lg" style="display: none;">
                    <span class="text-xl mr-2">➕</span>
                    新增作業
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let homeworkCounter = 0;
        let editMode = false;
        let isSaving = false;
        let homeworkData = []; 
        
        const firstSemesterStart = new Date('2025-09-01');
        const firstSemesterEnd = new Date('2026-01-20');
        const secondSemesterStart = new Date('2026-02-11');
        const secondSemesterEnd = new Date('2026-08-31');
        
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXXyyN1nib4ovwXmmEVzMYAS9j3X370DhRPLkXFNzQD16aYRi1r-bg5giOCc7nZPFhiQ/exec';
        
        const CACHE_CONFIG = {
            TTL: 12 * 60 * 60 * 1000,
            CLASS_ID: '601',
            SHOW_SYNC_HINTS: false,
            PREFETCH_WEEKENDS: false,
            VERSION: '1.1.0',
            DEBUG: true,
            BACKGROUND_UPDATE_INTERVAL: 5000,
            BACKGROUND_UPDATE_ENABLED: true
        };
        
        const memoryCache = new Map();
        const inflightRequests = new Map();
        let currentLoadController = null;
        let backgroundUpdateTimer = null;
        let isBackgroundUpdating = false;
        let lastBackgroundUpdate = 0;
        
        class CacheItem {
            constructor(data, hash = null) {
                this.data = data;
                this.cachedAt = Date.now();
                this.hash = hash || this.calculateHash(data);
                this.version = CACHE_CONFIG.VERSION;
            }
            
            calculateHash(data) {
                const str = JSON.stringify(data);
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash; 
                }
                return hash.toString(36);
            }
            
            isExpired() {
                return (Date.now() - this.cachedAt) > CACHE_CONFIG.TTL;
            }
            
            isValidVersion() {
                return this.version === CACHE_CONFIG.VERSION;
            }
        }
        
        function getCacheKey(dateKey) {
            return `hw:${CACHE_CONFIG.CLASS_ID}:${dateKey}`;
        }
        
        function getFromMemoryCache(dateKey) {
            const cacheKey = getCacheKey(dateKey);
            const item = memoryCache.get(cacheKey);
            
            if (!item || item.isExpired() || !item.isValidVersion()) {
                memoryCache.delete(cacheKey);
                return null;
            }
            return item;
        }
        
        function getFromLocalStorage(dateKey) {
            try {
                const cacheKey = getCacheKey(dateKey);
                const stored = localStorage.getItem(cacheKey);
                if (!stored) return null;
                
                const item = new CacheItem(null);
                Object.assign(item, JSON.parse(stored));
                
                if (item.isExpired() || !item.isValidVersion()) {
                    localStorage.removeItem(cacheKey);
                    return null;
                }
                return item;
            } catch (error) {
                return null;
            }
        }
        
        function writeToCache(dateKey, data, hash = null) {
            const cacheKey = getCacheKey(dateKey);
            const item = new CacheItem(data, hash);
            
            memoryCache.set(cacheKey, item);
            
            try {
                localStorage.setItem(cacheKey, JSON.stringify(item));
            } catch (error) {}
        }
        
        function cleanExpiredCache() {
            for (const [key, item] of memoryCache.entries()) {
                if (item.isExpired() || !item.isValidVersion()) {
                    memoryCache.delete(key);
                }
            }
            
            try {
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith(`hw:${CACHE_CONFIG.CLASS_ID}:`)) {
                        try {
                            const stored = localStorage.getItem(key);
                            if (stored) {
                                const item = JSON.parse(stored);
                                const cacheItem = new CacheItem(null);
                                Object.assign(cacheItem, item);
                                
                                if (cacheItem.isExpired() || !cacheItem.isValidVersion()) {
                                    keysToRemove.push(key);
                                }
                            }
                        } catch (e) {
                            keysToRemove.push(key);
                        }
                    }
                }
                keysToRemove.forEach(key => localStorage.removeItem(key));
            } catch (error) {}
        }
        
        function calculateStableHash(rawData) {
            if (!rawData || !Array.isArray(rawData)) {
                return 'empty';
            }
            
            const stableContent = rawData.map(item => {
                if (typeof item === 'string') {
                    return { content: item.trim(), subject: '國語', status: 'confirmed' };
                } else if (item && typeof item === 'object') {
                    return {
                        content: (item.text || item.content || item.homework || '').toString().trim(),
                        subject: item.subject || item.subj || '國語',
                        status: item.confirmed === true || item.status === 'confirmed' ? 'confirmed' : 'editing'
                    };
                }
                return null;
            }).filter(Boolean);
            
            const str = JSON.stringify(stableContent);
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; 
            }
            return hash.toString(36);
        }
        
        function generateStableId(subject, content, index) {
            const baseStr = `${subject}|${content}|${index}`;
            let hash = 0;
            for (let i = 0; i < baseStr.length; i++) {
                const char = baseStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return `hw_${hash.toString(36)}`;
        }
        
        function normalizeHomeworkData(rawData) {
            if (!rawData || !Array.isArray(rawData)) {
                return [];
            }
            
            return rawData.map((item, index) => {
                let content = '';
                let subject = '國語';
                let status = 'confirmed';
                let timestamp = null;
                
                if (typeof item === 'string') {
                    content = item.trim();
                } else if (item && typeof item === 'object') {
                    content = (item.text || item.content || item.homework || '').toString().trim();
                    subject = item.subject || item.subj || '國語';
                    
                    if (item.confirmed === true || item.status === 'confirmed') {
                        status = 'confirmed';
                    } else if (item.status === 'editing') {
                        status = 'editing';
                    } else {
                        status = 'confirmed';
                    }
                    
                    timestamp = item.timestamp || item.time || null;
                }
                
                if (content) {
                    const stableId = generateStableId(subject, content, index);
                    return new HomeworkItem(
                        stableId,
                        subject,
                        content,
                        status,
                        timestamp
                    );
                }
                return null;
            }).filter(Boolean);
        }
        
        function getPreviousSchoolDay(date) {
            const prev = new Date(date);
            do {
                prev.setDate(prev.getDate() - 1);
                if (prev < firstSemesterStart) return null;
            } while (prev.getDay() === 0 || prev.getDay() === 6);
            return prev;
        }
        
        function getNextSchoolDay(date) {
            const next = new Date(date);
            do {
                next.setDate(next.getDate() + 1);
                if (next > secondSemesterEnd) return null;
            } while (next.getDay() === 0 || next.getDay() === 6);
            return next;
        }
        
        async function prefetchAdjacentDays(currentDateKey) {
            if (!CACHE_CONFIG.SHOW_SYNC_HINTS) return;
            
            const currentDateObj = new Date(currentDateKey);
            const prevDay = getPreviousSchoolDay(currentDateObj);
            const nextDay = getNextSchoolDay(currentDateObj);
            
            const prefetchPromises = [];
            
            if (prevDay) {
                const prevDateKey = dateKeyISO(prevDay);
                if (!getFromMemoryCache(prevDateKey)) {
                    prefetchPromises.push(
                        loadFromCloudWithCache(prevDateKey, true).catch(() => {})
                    );
                }
            }
            
            if (nextDay) {
                const nextDateKey = dateKeyISO(nextDay);
                if (!getFromMemoryCache(nextDateKey)) {
                    prefetchPromises.push(
                        loadFromCloudWithCache(nextDateKey, true).catch(() => {})
                    );
                }
            }
            
            if (prefetchPromises.length > 0) {
                Promise.all(prefetchPromises);
            }
        }
        
        async function performBackgroundUpdate() {
            if (isBackgroundUpdating || editMode) {
                return; 
            }
            
            const now = Date.now();
            if (now - lastBackgroundUpdate < CACHE_CONFIG.BACKGROUND_UPDATE_INTERVAL) {
                return; 
            }
            
            isBackgroundUpdating = true;
            lastBackgroundUpdate = now;
            
            try {
                const dateKey = dateKeyISO(currentDate);
                const cacheItem = getFromMemoryCache(dateKey) || getFromLocalStorage(dateKey);
                
                const cloudResult = await loadFromCloudWithCache(dateKey, true);
                
                if (cacheItem && cloudResult.hash && cacheItem.hash !== cloudResult.hash) {
                    showBackgroundUpdateNotification();
                }
                
            } catch (error) {
            } finally {
                isBackgroundUpdating = false;
            }
        }
        
        function showBackgroundUpdateNotification() {
            if (document.getElementById('backgroundUpdateNotification')) {
                return;
            }
            
            const notification = document.createElement('div');
            notification.id = 'backgroundUpdateNotification';
            notification.className = 'fixed top-20 right-4 bg-blue-100 border border-blue-300 text-blue-800 px-4 py-3 rounded-lg shadow-lg z-50 max-w-sm';
            notification.innerHTML = `
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <span class="text-lg">🔄</span>
                        <div>
                            <div class="font-medium">資料已更新</div>
                            <div class="text-sm">點擊重新載入查看最新內容</div>
                        </div>
                    </div>
                    <button onclick="applyBackgroundUpdate()" class="ml-3 bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm font-medium transition-colors">
                        重新載入
                    </button>
                </div>
                <button onclick="dismissBackgroundUpdate()" class="absolute top-1 right-1 text-blue-400 hover:text-blue-600 text-lg leading-none" title="關閉">
                    ×
                </button>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                dismissBackgroundUpdate();
            }, 10000);
        }
        
        async function applyBackgroundUpdate() {
            dismissBackgroundUpdate();
            await forceReloadHomework();
        }
        
        function dismissBackgroundUpdate() {
            const notification = document.getElementById('backgroundUpdateNotification');
            if (notification) {
                notification.remove();
            }
        }
        
        function startBackgroundUpdate() {
            if (!CACHE_CONFIG.BACKGROUND_UPDATE_ENABLED) return;
            
            stopBackgroundUpdate(); 
            
            backgroundUpdateTimer = setInterval(() => {
                if (document.visibilityState === 'visible') {
                    performBackgroundUpdate();
                }
            }, CACHE_CONFIG.BACKGROUND_UPDATE_INTERVAL);
        }
        
        function stopBackgroundUpdate() {
            if (backgroundUpdateTimer) {
                clearInterval(backgroundUpdateTimer);
                backgroundUpdateTimer = null;
            }
        }
        
        function dateKeyISO(d) {
            const taipeiDate = new Intl.DateTimeFormat('zh-TW', {
                timeZone: 'Asia/Taipei',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).formatToParts(d);
            
            const year = taipeiDate.find(part => part.type === 'year').value;
            const month = taipeiDate.find(part => part.type === 'month').value;
            const day = taipeiDate.find(part => part.type === 'day').value;
            
            return `${year}-${month}-${day}`;
        }
        
        class HomeworkItem {

        let draggedElement = null;

        function handleDragStart(e) {
            const homeworkItem = e.target.closest('.sortable-item');
            if (!homeworkItem) return;
            
            draggedElement = homeworkItem;
            draggedHomeworkId = homeworkItem.dataset.homeworkId;
            homeworkItem.classList.add('dragging');
            
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedHomeworkId);
        }
        
        function handleDragEnd(e) {
            const homeworkItem = e.target.closest('.sortable-item');
            if (homeworkItem) {
                homeworkItem.classList.remove('dragging');
            }
            
            document.querySelectorAll('.sortable-item').forEach(item => {
                item.classList.remove('drag-over');
            });
            
            draggedElement = null;
            draggedHomeworkId = null;
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedElement) return;
            
            e.dataTransfer.dropEffect = 'move';
            
            const dropTarget = e.target.closest('.sortable-item');
            if (dropTarget && dropTarget !== draggedElement) {
                document.querySelectorAll('.sortable-item').forEach(item => {
                    item.classList.remove('drag-over');
                });
                dropTarget.classList.add('drag-over');
            }
        }
        
        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedElement || !draggedHomeworkId) return;
            
            const dropTarget = e.target.closest('.sortable-item');
            if (dropTarget && dropTarget !== draggedElement) {
                const dropTargetId = dropTarget.dataset.homeworkId;
                reorderHomework(draggedHomeworkId, dropTargetId);
                renderAllHomework();
                showNotification('作業順序已調整', 'success');
            }
            
            document.querySelectorAll('.sortable-item').forEach(item => {
                item.classList.remove('drag-over');
            });
        }

            const draggedItem = homeworkData.splice(draggedIndex, 1)[0];
            homeworkData.splice(targetIndex, 0, draggedItem);

        async function saveToGoogleSheets(dateKey, homeworkData) {
            try {
                const formData = new FormData();
                formData.append('action', 'save');
                formData.append('dateKey', dateKey);
                formData.append('classId', '601');
                formData.append('data', JSON.stringify(homeworkData));
                formData.append('token', 'homework2025');
                formData.append('ua', navigator.userAgent || 'unknown');
                formData.append('timestamp', new Date().toISOString());
        
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    cache: 'no-store',
                    redirect: 'follow'
                });
        
                if (!response.ok) {
                    throw new Error(`HTTP錯誤 ${response.status}: ${response.statusText}`);
                }
        
                const responseText = await response.text();
        
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    throw new Error(`伺服器回應格式錯誤: ${parseError.message}`);
                }
                
                if (result && (result.success === true || result.ok === true || result.status === 'success')) {
                    return { success: true, message: '作業已成功儲存到雲端' };
                } else {
                    const errorMsg = result?.error || result?.msg || result?.message || '儲存失敗，原因不明';
                    throw new Error(errorMsg);
                }
            } catch (error) {
                try {
                    localStorage.setItem(dateKey, JSON.stringify(homeworkData));
                } catch (localError) {}
                
                return { 
                    success: false, 
                    message: `雲端儲存失敗: ${error.message}`,
                    isNetworkError: error.name === 'TypeError' || error.message.includes('fetch') || error.message.includes('網路')
                };
            }
        }
        
        async function loadFromCloudWithCache(dateKey, isPrefetch = false) {
            if (inflightRequests.has(dateKey)) {
                return await inflightRequests.get(dateKey);
            }
            
            const loadPromise = (async () => {
                let controller = null;
                let timeoutId = null;
                
                try {
                    if (!isPrefetch) {
                        showSyncStatus(true, '載入中...');
                    }
                    
                    controller = new AbortController();
                    timeoutId = setTimeout(() => controller.abort(), 15000); 
                    
                    if (!isPrefetch) {
                        if (currentLoadController) {
                            currentLoadController.abort();
                        }
                        currentLoadController = controller;
                    }
                    
                    const params = new URLSearchParams({
                        action: 'load',
                        dateKey: dateKey,
                        classId: CACHE_CONFIG.CLASS_ID,
                        token: 'homework2025',
                        timestamp: Date.now().toString(),
                        _t: Date.now() 
                    });
                    
                    const url = `${APPS_SCRIPT_URL}?${params.toString()}`;
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        signal: controller.signal,
                        cache: 'no-store',
                        redirect: 'follow'
                    });
                    
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                        timeoutId = null;
                    }
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const responseText = await response.text();
                    let result;
                    
                    try {
                        result = JSON.parse(responseText);
                    } catch (parseError) {
                        throw new Error(`伺服器回應格式錯誤: ${parseError.message}`);
                    }
                    
                    if (result && typeof result === 'object') {
                        const isSuccess = result.success === true || 
                                        result.ok === true || 
                                        result.status === 'success' || 
                                        result.data !== undefined ||
                                        result.homework !== undefined ||
                                        result.homeworkData !== undefined;
                        
                        if (isSuccess) {
                            const rawData = result.data || result.homework || result.homeworkData || [];
                            const normalizedData = normalizeHomeworkData(rawData);
                            const hash = result.etag || result.hash || calculateStableHash(rawData);
                            
                            writeToCache(dateKey, normalizedData, hash);
                            return { data: normalizedData, hash, fromCloud: true };
                        } else {
                            const errorMsg = result.error || result.msg || result.message || '載入失敗';
                            if (errorMsg.includes('找不到') || 
                                errorMsg.includes('not found') || 
                                errorMsg.includes('No data') || 
                                errorMsg.includes('empty') ||
                                errorMsg.includes('沒有資料')) {
                                const emptyData = [];
                                writeToCache(dateKey, emptyData, 'empty');
                                return { data: emptyData, hash: 'empty', fromCloud: true };
                            }
                            throw new Error(errorMsg);
                        }
                    } else {
                        throw new Error('伺服器回應格式無效');
                    }
                    
                } catch (error) {
                    if (error.name === 'AbortError') {
                        throw error;
                    }
                    
                    try {
                        const legacyData = localStorage.getItem(dateKey);
                        if (legacyData) {
                            const parsed = JSON.parse(legacyData);
                            const normalizedData = normalizeHomeworkData(parsed);
                            return { data: normalizedData, hash: null, fromCloud: false };
                        }
                    } catch (localError) {}
                    
                    if (!isPrefetch && (error.message.includes('fetch') || error.message.includes('網路') || error.message.includes('HTTP'))) {
                        showNotification(`載入失敗: ${error.message}`, 'error');
                    }
                    
                    return { data: [], hash: null, fromCloud: false };
                    
                } finally {
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                    }
                    
                    if (!isPrefetch) {
                        showSyncStatus(false);
                        if (controller && currentLoadController === controller) {
                            currentLoadController = null;
                        }
                    }
                }
            })();
            
            inflightRequests.set(dateKey, loadPromise);
            
            try {
                const result = await loadPromise;
                return result;
            } finally {
                inflightRequests.delete(dateKey);
            }
        }
        
        async function loadHomeworkWithSWR(dateKey) {
            const loadingDateKey = dateKey;
            let hasRenderedStale = false;
            
            let cacheItem = getFromMemoryCache(dateKey) || getFromLocalStorage(dateKey);
            
            if (cacheItem && cacheItem.data) {
                if (dateKeyISO(currentDate) === loadingDateKey) {
                    homeworkData = [...cacheItem.data];
                    renderAllHomework();
                    hasRenderedStale = true;
                }
            } else {
                homeworkData = [];
                renderAllHomework(true); 
            }
            
            try {
                const cloudResult = await Promise.race([
                    loadFromCloudWithCache(dateKey),
                    new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('載入超時')), 12000) 
                    )
                ]);
                
                if (dateKeyISO(currentDate) !== loadingDateKey) {
                    return;
                }
                
                const needsUpdate = !cacheItem || 
                                  cacheItem.hash !== cloudResult.hash ||
                                  !hasRenderedStale;
                
                if (needsUpdate && cloudResult.data !== undefined) {
                    homeworkData = [...cloudResult.data];
                    renderAllHomework();
                    
                    if (hasRenderedStale && cloudResult.fromCloud && 
                        JSON.stringify(cacheItem.data) !== JSON.stringify(cloudResult.data)) {
                        showNotification('資料已更新', 'success');
                    }
                } 
                
                if (cloudResult.fromCloud) {
                    setTimeout(() => prefetchAdjacentDays(dateKey), 500);
                }
                
            } catch (error) {
                if (error.name === 'AbortError') {
                    return; 
                }
                
                if (!hasRenderedStale) {
                    homeworkData = [];
                    renderAllHomework();
                }
            }
        }
        
        async function saveHomeworkInstantly() {
            if (isSaving) {
                return { success: false, message: '正在儲存中' };
            }
            
            isSaving = true;
            
            try {
                const dateKey = dateKeyISO(currentDate);
                
                const legacyData = homeworkData.map(hw => ({
                    text: hw.content,
                    subject: hw.subject,
                    confirmed: hw.status === 'confirmed',
                    timestamp: hw.timestamp
                }));
                
                try {
                    localStorage.setItem(dateKey, JSON.stringify(legacyData));
                } catch (localError) {}
                
                const result = await saveToGoogleSheets(dateKey, legacyData);
                
                if (result.success) {
                    const normalizedData = normalizeHomeworkData(legacyData);
                    writeToCache(dateKey, normalizedData);
                }
                
                return result;
            } finally {
                isSaving = false;
            }
        }
        
        async function loadHomework() {
            const dateKey = dateKeyISO(currentDate);
            await loadHomeworkWithSWR(dateKey);
        }
        
        async function toggleEditMode() {
            if (!editMode) {
                showCustomPasswordDialog();
                return;
            }
        
            const editingHomework = homeworkData.filter(hw => hw.status === 'editing');
            editingHomework.forEach(hw => {
                if (hw.content.trim()) {
                    hw.status = 'confirmed'; 
                } else {
                    const index = homeworkData.findIndex(h => h.id === hw.id);
                    if (index !== -1) {
                        homeworkData.splice(index, 1);
                    }
                }
            });
        
            const savingDialog = showSavingDialog('正在儲存作業到雲端...');
            setEditBtnBusy(true);
        
            let saveResult;
            try {
                saveResult = await saveHomeworkInstantly();
            } catch (e) {
                saveResult = { success: false, message: 'SAVE_FATAL: ' + (e?.message || e) };
            }
        
            hideSavingDialog();
            setEditBtnBusy(false);
        
            if (saveResult && saveResult.success) {
                editMode = false;
                updateEditModeUI();
                
                showNotification(saveResult.message || '儲存完成，正在重新載入...', 'success');
                setTimeout(async () => {
                    await loadHomework();
                    showNotification('資料已更新！', 'success');
                }, 2000);
                
                renderAllHomework(); 
            } else {
                showNotification(saveResult?.message || '儲存失敗', 'error');
            }
        }
        
        function updateEditModeUI() {
            const editIcon = document.getElementById('editIcon');
            const editText = document.getElementById('editText');
            const editModeBtn = document.getElementById('editModeBtn');
            const addHomeworkBtn = document.getElementById('addHomeworkBtn');
            const sortModeIndicator = document.getElementById('sortModeIndicator');
        
            if (!editIcon || !editText || !editModeBtn || !addHomeworkBtn) {
                return;
            }
        
            if (editMode) {
                editIcon.textContent = '🔓';
                editText.textContent = '退出編輯';
                editModeBtn.className = 'group relative bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white px-4 py-2 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-105 flex items-center space-x-2';
                editModeBtn.title = '退出編輯模式';
                addHomeworkBtn.style.display = 'flex';
                
                if (sortModeIndicator) {
                    sortModeIndicator.style.display = 'block';
                }
                
                stopBackgroundUpdate();
            } else {
                editIcon.textContent = '🔐';
                editText.textContent = '編輯模式';
                editModeBtn.className = 'group relative bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-4 py-2 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-105 flex items-center space-x-2';
                editModeBtn.title = '編輯作業';
                addHomeworkBtn.style.display = 'none';
                
                if (sortModeIndicator) {
                    sortModeIndicator.style.display = 'none';
                }
                
                startBackgroundUpdate();
            }
        }
        
        function showCustomPasswordDialog() {
            const existingOverlay = document.querySelector('.password-dialog-overlay');
            if (existingOverlay) existingOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.className = 'password-dialog-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center';
            overlay.style.zIndex = '9999';
            
            const dialog = document.createElement('div');
            dialog.className = 'bg-white rounded-xl p-6 shadow-2xl max-w-sm w-full mx-4';
            
            dialog.innerHTML = `
                <h3 style="font-size: 18px; font-weight: 600; color: #374151; margin-bottom: 16px; text-align: center;">🔐 請輸入密碼</h3>
                <input type="password" id="customPasswordInput" placeholder="請輸入密碼..." 
                       style="width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px 16px; text-align: center; font-size: 18px; font-weight: 500; margin-bottom: 16px; outline: none;">
                <div style="display: flex; gap: 12px;">
                    <button onclick="cancelPasswordDialog()" style="flex: 1; background-color: #6b7280; color: white; padding: 8px 0; border-radius: 8px; font-weight: 500; border: none; cursor: pointer;">
                        取消
                    </button>
                    <button onclick="confirmPassword()" style="flex: 1; background-color: #6366f1; color: white; padding: 8px 0; border-radius: 8px; font-weight: 500; border: none; cursor: pointer;">
                        確認
                    </button>
                </div>
            `;
            
            overlay.appendChild(dialog);
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                const input = document.getElementById('customPasswordInput');
                if (input) {
                    input.focus();
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') confirmPassword();
                    });
                }
            }, 200);
            
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) cancelPasswordDialog();
            });
        }
        
        async function confirmPassword() {
            const input = document.getElementById('customPasswordInput');
            const password = input ? input.value : '';
            const overlay = document.querySelector('.password-dialog-overlay');
            
            if (password === '0944') {
                editMode = true;
                updateEditModeUI();
                
                if (overlay) overlay.remove();
                showNotification('已進入編輯模式', 'success');
                renderAllHomework(); 
            } else if (password !== '') {
                showNotification('密碼錯誤！', 'error');
                if (input) {
                    input.value = '';
                    input.focus();
                }
            }
        }
        
        function cancelPasswordDialog() {
            const overlay = document.querySelector('.password-dialog-overlay');
            if (overlay) overlay.remove();
        }
        
        function setEditBtnBusy(busy) {
            const btn = document.getElementById('editModeBtn');
            if (!btn) return;
            btn.disabled = busy;
            const content = btn.querySelector('[data-role="btn-content"]');
            const spinner = btn.querySelector('[data-role="spinner"]');
            if (content) content.classList.toggle('hidden', busy);
            if (spinner) spinner.classList.toggle('hidden', !busy);
        }
        
        async function forceReloadHomework() {
            const dateKey = dateKeyISO(currentDate);
            
            const cacheKey = getCacheKey(dateKey);
            memoryCache.delete(cacheKey);
            try {
                localStorage.removeItem(cacheKey);
                localStorage.removeItem(dateKey);
            } catch (e) {}
            
            showNotification('正在重新載入雲端資料...', 'success');
            
            try {
                if (currentLoadController) {
                    currentLoadController.abort();
                }
                
                const cloudResult = await loadFromCloudWithCache(dateKey);
                
                if (dateKeyISO(currentDate) === dateKey) {
                    homeworkData = [...cloudResult.data];
                    renderAllHomework();
                    showNotification('資料已重新載入！', 'success');
                }
            } catch (error) {
                homeworkData = [];
                renderAllHomework();
            }
        }
        
        let navigationLocked = false;
        const NAVIGATION_LOCK_DURATION = 300; 
        
        function updateCountdown(currentDayTime) {
            const events = [
                { name: '第一次定期評量 (4/16-17)', date: new Date(2026, 3, 16).getTime() },
                { name: '全台學力檢測 (5/28)', date: new Date(2026, 4, 28).getTime() },
                { name: '畢業班第二次定期評量 (6/1-5)', date: new Date(2026, 5, 1).getTime() },
                { name: '校慶＆畢業典禮 (6/18)', date: new Date(2026, 5, 18).getTime() }
            ];
        
            let upcomingEvent = null;
            let remainingDays = 0;
        
            for (const event of events) {
                if (event.date >= currentDayTime) {
                    upcomingEvent = event;
                    remainingDays = Math.floor((event.date - currentDayTime) / (1000 * 60 * 60 * 24));
                    break;
                }
            }
        
            const countdownMarquee = document.getElementById('countdownMarquee');
            const marqueeText = document.getElementById('marqueeText');
        
            if (upcomingEvent) {
                countdownMarquee.style.display = 'flex';
                let baseMsg = '';
                if (remainingDays === 0) {
                    baseMsg = `📢 🌟 提醒：【${upcomingEvent.name}】就是今天！祝大家順利！ 💪 🌟`;
                } else {
                    baseMsg = `📢 提醒：距離【${upcomingEvent.name}】還剩下 <span class="text-2xl text-red-500 font-black mx-2">${remainingDays}</span> 天！`;
                }
                
                const itemHTML = `<div class="flex items-center px-12">${baseMsg}</div>`;
                marqueeText.innerHTML = Array(10).fill(itemHTML).join('');
            } else {
                countdownMarquee.style.display = 'none'; 
            }
        }
        
        function updateDateDisplaySync() {
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            
            let semesterInfo = '';
            let weekNumber = 1;
            
            const stripTime = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
            const currentDayTime = stripTime(currentDate);
            const s1Start = stripTime(firstSemesterStart);
            const s1End = stripTime(firstSemesterEnd);
            const s2Start = stripTime(secondSemesterStart);
            const s2End = stripTime(secondSemesterEnd);
        
            if (currentDayTime >= s1Start && currentDayTime <= s1End) {
                semesterInfo = '114學年第一學期';
                const baseDate = new Date(2025, 7, 31).getTime(); 
                const diffDays = Math.floor((currentDayTime - baseDate) / (1000 * 60 * 60 * 24));
                weekNumber = Math.floor(diffDays / 7) + 1;
                if (weekNumber > 22) weekNumber = 22;
                if (weekNumber < 1) weekNumber = 1;
            } else if (currentDayTime >= s2Start && currentDayTime <= s2End) {
                semesterInfo = '114學年第二學期';
                const baseDate = new Date(2026, 1, 8).getTime(); 
                const diffDays = Math.floor((currentDayTime - baseDate) / (1000 * 60 * 60 * 24));
                weekNumber = Math.floor(diffDays / 7) + 1;
                if (weekNumber > 22) weekNumber = 22;
                if (weekNumber < 1) weekNumber = 1;
            } else if (currentDayTime < s1Start) {
                semesterInfo = '114學年第一學期';
                weekNumber = 1;
            } else if (currentDayTime > s1End && currentDayTime < s2Start) {
                semesterInfo = '114學年寒假';
                weekNumber = 1;
            } else {
                semesterInfo = '114學年暑假';
                weekNumber = 1;
            }
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const date = currentDate.getDate();
            const weekday = weekdays[currentDate.getDay()];
            
            document.getElementById('semesterInfo').textContent = semesterInfo;
            document.getElementById('weekInfo').textContent = `第${weekNumber}週`;
            document.getElementById('dateOnly').textContent = `${year}年${month}月${date}日`;
            document.getElementById('weekdayOnly').textContent = weekday;
            
            updateCountdown(currentDayTime);
        }
        
        function updateDateDisplay() {
            updateDateDisplaySync();
            
            requestAnimationFrame(() => {
                loadHomework().catch(error => {});
            });
        }
        
        function previousDay() {
            if (navigationLocked) return;
            navigationLocked = true;
            setTimeout(() => { navigationLocked = false; }, NAVIGATION_LOCK_DURATION);
            
            do {
                currentDate.setDate(currentDate.getDate() - 1);
                if (currentDate < firstSemesterStart) {
                    currentDate = new Date(firstSemesterStart);
                    updateDateDisplay();
                    return;
                }
            } while (currentDate.getDay() === 0 || currentDate.getDay() === 6);
            
            updateDateDisplay();
        }
        
        function nextDay() {
            if (navigationLocked) return;
            navigationLocked = true;
            setTimeout(() => { navigationLocked = false; }, NAVIGATION_LOCK_DURATION);
            
            do {
                currentDate.setDate(currentDate.getDate() + 1);
                if (currentDate > secondSemesterEnd) {
                    currentDate = new Date(secondSemesterEnd);
                    updateDateDisplay();
                    return;
                }
            } while (currentDate.getDay() === 0 || currentDate.getDay() === 6);
            
            updateDateDisplay();
        }
        
        function today() {
            if (navigationLocked) return;
            navigationLocked = true;
            setTimeout(() => { navigationLocked = false; }, NAVIGATION_LOCK_DURATION);
            
            currentDate = new Date();
            updateDateDisplay();
        }
        
        function migrateLegacyCache() {
            try {
                let migratedCount = 0;
                const keysToRemove = [];
                
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key) continue;
                    
                    if (/^\d{4}-\d{2}-\d{2}$/.test(key)) {
                        try {
                            const legacyData = localStorage.getItem(key);
                            if (legacyData) {
                                const parsed = JSON.parse(legacyData);
                                const normalizedData = normalizeHomeworkData(parsed);
                                
                                writeToCache(key, normalizedData);
                                keysToRemove.push(key);
                                migratedCount++;
                            }
                        } catch (e) {
                            keysToRemove.push(key);
                        }
                    }
                }
                
                keysToRemove.forEach(key => localStorage.removeItem(key));
            } catch (error) {}
        }
        
        async function init() {
            migrateLegacyCache();
            cleanExpiredCache();
            
            currentDate = new Date();
            updateDateDisplay();
            
            startBackgroundUpdate();
            
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && !editMode) {
                    setTimeout(performBackgroundUpdate, 1000);
                }
            });
        }
        
        window.addEventListener('load', () => {
            init();
        });
        
        window.addEventListener('beforeunload', () => {
            if (currentLoadController) {
                currentLoadController.abort();
            }
            inflightRequests.clear();
            stopBackgroundUpdate();
        });
        
        function showDatePicker() {
            const existingOverlay = document.querySelector('.date-picker-overlay');
            if (existingOverlay) existingOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.className = 'date-picker-overlay';
            
            const dialog = document.createElement('div');
            dialog.className = 'date-picker-dialog';
            
            const currentDateStr = currentDate.toISOString().split('T')[0];
            
            dialog.innerHTML = `
                <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">📅 選擇日期</h3>
                <input type="date" id="datePickerInput" class="date-picker-input" value="${currentDateStr}" 
                       min="${firstSemesterStart.toISOString().split('T')[0]}" 
                       max="${secondSemesterEnd.toISOString().split('T')[0]}">
                <div class="text-sm text-gray-600 mb-4 text-center">
                    學期範圍：${firstSemesterStart.getFullYear()}年${firstSemesterStart.getMonth() + 1}月${firstSemesterStart.getDate()}日 - ${secondSemesterEnd.getFullYear()}年${secondSemesterEnd.getMonth() + 1}月${secondSemesterEnd.getDate()}日
                </div>
                <div class="flex gap-3">
                    <button onclick="cancelDatePicker()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-2 px-4 rounded-lg font-medium transition-colors">
                        取消
                    </button>
                    <button onclick="confirmDatePicker()" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-2 px-4 rounded-lg font-medium transition-colors">
                        確認
                    </button>
                </div>
            `;
            
            overlay.appendChild(dialog);
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                const input = document.getElementById('datePickerInput');
                if (input) {
                    input.focus();
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') confirmDatePicker();
                    });
                }
            }, 100);
            
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) cancelDatePicker();
            });
        }
        
        async function confirmDatePicker() {
            const input = document.getElementById('datePickerInput');
            const overlay = document.querySelector('.date-picker-overlay');
            
            if (!input || !input.value) {
                showNotification('請選擇有效日期！', 'warning');
                return;
            }
            
            const selectedDate = new Date(input.value + 'T12:00:00');
            
            if (selectedDate < firstSemesterStart || selectedDate > secondSemesterEnd) {
                showNotification('所選日期超出學期範圍！', 'warning');
                return;
            }
            
            if (selectedDate.getDay() === 0 || selectedDate.getDay() === 6) {
                showNotification('週末沒有上課，請選擇平日！', 'warning');
                return;
            }
            
            currentDate = selectedDate;
            if (overlay) overlay.remove();
            
            showNotification('正在載入所選日期...', 'success');
            await updateDateDisplay();
        }
        
        function cancelDatePicker() {
            const overlay = document.querySelector('.date-picker-overlay');
            if (overlay) overlay.remove();
        }
    </script>
</body>
