<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上岐601聯絡簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .homework-item {
            transition: all 0.3s ease;
        }
        .homework-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .sync-indicator {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .saving-overlay, .date-picker-overlay, .password-dialog-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .saving-dialog, .date-picker-dialog {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        .date-picker-dialog {
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .date-picker-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .date-picker-input:focus {
            border-color: #6366f1;
        }
        .homework-confirmed {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border: 2px solid #10b981;
        }
        .homework-pending {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
        }
        .homework-editing {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border: 2px solid #6b7280;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-confirmed { background-color: #10b981; color: white; }
        .status-pending { background-color: #f59e0b; color: white; }
        .status-editing { background-color: #6b7280; color: white; }
        
        /* 聯絡簿拖拽排序樣式 */
        .sortable-item {
            cursor: move;
            transition: all 0.2s ease;
        }
        .sortable-item:hover { transform: translateY(-1px); }
        .sortable-item.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
            z-index: 1000;
        }
        .sortable-item.drag-over { border-top: 3px solid #6366f1; }
        .drag-handle {
            cursor: grab;
            color: #9ca3af;
            transition: color 0.2s;
        }
        .drag-handle:hover { color: #6366f1; }
        .drag-handle:active { cursor: grabbing; }
        .sort-mode-indicator {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 8px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 600;
            color: #92400e;
        }

        /* 跑馬燈拖拽排序樣式 */
        .global-sortable-item {
            cursor: move;
            transition: all 0.2s ease;
        }
        .global-sortable-item:hover { transform: translateY(-1px); }
        .global-sortable-item.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
            z-index: 1000;
        }
        .global-sortable-item.drag-over { border-top: 3px solid #eab308; }
        .global-drag-handle {
            cursor: grab;
            color: #9ca3af;
            transition: color 0.2s;
        }
        .global-drag-handle:hover { color: #ca8a04; }
        .global-drag-handle:active { cursor: grabbing; }
        
        /* 跑馬燈動畫 */
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }
        .marquee-wrapper {
            overflow: hidden;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .marquee-content {
            display: flex;
            white-space: nowrap;
            width: max-content;
            animation-name: scroll;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        .marquee-wrapper:hover .marquee-content {
            animation-play-state: paused;
        }
        .marquee-item-group {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            min-width: 100%;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-2 sm:p-4">

        <!-- 聯絡簿卡片 -->

            <!-- 今日作業區域 -->

                <!-- 控制列 -->

                    <div class="flex items-center flex-wrap gap-2">

    <script>
        let currentDate = new Date();
        let homeworkCounter = 0;
        let editMode = false;
        let isSaving = false;
        let homeworkData = []; 
        
        // 全域跑馬燈設定與狀態
        let globalConfig = { marqueeSpeed: 200 }; 
        let globalEvents = [
            { id: 'e1', type: 'countdown', name: '第一次定期評量 (4/16-17)', date: '2026-04-16', enabled: true },
            { id: 'e2', type: 'countdown', name: '全台學力檢測 (5/28)', date: '2026-05-28', enabled: true },
            { id: 'e3', type: 'countdown', name: '畢業班第二次定期評量 (6/1-5)', date: '2026-06-01', enabled: true },
            { id: 'e4', type: 'countdown', name: '校慶＆畢業典禮 (6/18)', date: '2026-06-18', enabled: true }
        ];
        
        // 紀錄當前載入的跑馬燈原始資料，用於背景比對
        let currentGlobalDataString = null;

        const firstSemesterStart = new Date('2025-09-01');
        const firstSemesterEnd = new Date('2026-01-20');
        const secondSemesterStart = new Date('2026-02-11');
        const secondSemesterEnd = new Date('2026-08-31');

        // 請確保此處為最新佈署的 GAS 網址
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXXyyN1nib4ovwXmmEVzMYAS9j3X370DhRPLkXFNzQD16aYRi1r-bg5giOCc7nZPFhiQ/exec';

        const CACHE_CONFIG = {
            TTL: 12 * 60 * 60 * 1000, 
            CLASS_ID: '601',
            SHOW_SYNC_HINTS: false,
            PREFETCH_WEEKENDS: false,
            VERSION: '1.8.0', // 【修復】升級版本至 1.8.0，徹底摧毀舊快取
            DEBUG: true, 
            BACKGROUND_UPDATE_INTERVAL: 5000, 
            BACKGROUND_UPDATE_ENABLED: true 
        };

        const memoryCache = new Map();
        const inflightRequests = new Map();
        let currentLoadController = null;
        let backgroundUpdateTimer = null;
        let isBackgroundUpdating = false;
        let lastBackgroundUpdate = 0;

        // 【修復：絕對零干擾的日期格式化】
        // 放棄原先的 Intl.DateTimeFormat，改用絕對嚴謹的 padStart，
        // 確保任何瀏覽器送出的 Key 都是完美的 YYYY-MM-DD，根絕 3/16 變 3-16 的悲劇。
        function dateKeyISO(d) {
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // 讀取端防呆機制：修復逗號截斷或換行引發的 JSON 損毀
        function parseRawData(rawData) {
            if (typeof rawData === 'string') {
                try { 
                    return JSON.parse(rawData); 
                } catch (e) { 
                    try {
                        let cleanStr = rawData.replace(/[\n\r\t]/g, ' ');
                        return JSON.parse(cleanStr);
                    } catch(e2) {
                        if (rawData.startsWith('[{') && !rawData.endsWith('}]')) {
                            try { return JSON.parse(rawData.replace(/,[^{]*$/, '') + '}]'); } catch(e3) {}
                        }
                        return [];
                    }
                }
            }
            return rawData || [];
        }

        class CacheItem {
            constructor(data, hash = null) {
                this.data = data;
                this.cachedAt = Date.now();
                this.hash = hash || this.calculateHash(data);
                this.version = CACHE_CONFIG.VERSION;
            }
            calculateHash(data) {
                const str = JSON.stringify(data);
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash; 
                }
                return hash.toString(36);
            }
            isExpired() { return (Date.now() - this.cachedAt) > CACHE_CONFIG.TTL; }
            isValidVersion() { return this.version === CACHE_CONFIG.VERSION; }
        }

        function getCacheKey(dateKey) { return `hw:${CACHE_CONFIG.CLASS_ID}:${dateKey}`; }

        function getFromMemoryCache(dateKey) {
            const cacheKey = getCacheKey(dateKey);
            const item = memoryCache.get(cacheKey);
            if (!item || item.isExpired() || !item.isValidVersion()) {
                memoryCache.delete(cacheKey);
                return null;
            }
            return item;
        }

        function getFromLocalStorage(dateKey) {
            try {
                const cacheKey = getCacheKey(dateKey);
                const stored = localStorage.getItem(cacheKey);
                if (!stored) return null;
                const item = new CacheItem(null);
                Object.assign(item, JSON.parse(stored));
                if (item.isExpired() || !item.isValidVersion()) {
                    localStorage.removeItem(cacheKey);
                    return null;
                }
                return item;
            } catch (error) { return null; }
        }

        function writeToCache(dateKey, data, hash = null) {
            const cacheKey = getCacheKey(dateKey);
            const item = new CacheItem(data, hash);
            memoryCache.set(cacheKey, item);
            try { localStorage.setItem(cacheKey, JSON.stringify(item)); } catch (error) {}
        }

        function calculateStableHash(rawData) {
            let parsedData = parseRawData(rawData);
            if (!Array.isArray(parsedData)) return 'empty';
            const stableContent = parsedData.map(item => {
                if (typeof item === 'string') return { content: item.trim(), subject: '國語', status: 'confirmed' };
                else if (item && typeof item === 'object') {
                    return {
                        content: (item.text || item.content || item.homework || '').toString().trim(),
                        subject: item.subject || item.subj || '國語',
                        status: item.confirmed === true || item.status === 'confirmed' ? 'confirmed' : 'editing'
                    };
                }
                return null;
            }).filter(Boolean);
            const str = JSON.stringify(stableContent);
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return hash.toString(36);
        }

        function generateStableId(subject, content, index) {
            const baseStr = `${subject}|${content}|${index}`;
            let hash = 0;
            for (let i = 0; i < baseStr.length; i++) {
                hash = ((hash << 5) - hash) + baseStr.charCodeAt(i);
                hash = hash & hash;
            }
            return `hw_${hash.toString(36)}`;
        }

        function normalizeHomeworkData(rawData) {
            let parsedData = parseRawData(rawData);
            if (!Array.isArray(parsedData)) return [];
            return parsedData.map((item, index) => {
                let content = '', subject = '國語', status = 'confirmed', timestamp = null;
                if (typeof item === 'string') content = item.trim();
                else if (item && typeof item === 'object') {
                    content = (item.text || item.content || item.homework || '').toString().trim();
                    subject = item.subject || item.subj || '國語';
                    status = (item.confirmed === true || item.status === 'confirmed') ? 'confirmed' : (item.status === 'editing' ? 'editing' : 'confirmed');
                    timestamp = item.timestamp || item.time || null;
                }
                if (content) return new HomeworkItem(generateStableId(subject, content, index), subject, content, status, timestamp);
                return null;
            }).filter(Boolean);
        }

        // 背景更新與比對邏輯
        async function performBackgroundUpdate() {
            if (isBackgroundUpdating || editMode) return;
            const now = Date.now();
            if (now - lastBackgroundUpdate < CACHE_CONFIG.BACKGROUND_UPDATE_INTERVAL) return;
            isBackgroundUpdating = true;
            lastBackgroundUpdate = now;
            try {
                let hasChanges = false;

                const dateKey = dateKeyISO(currentDate);
                const cacheItem = getFromMemoryCache(dateKey) || getFromLocalStorage(dateKey);
                const cloudResult = await loadFromCloudWithCache(dateKey, true);
                
                if (cacheItem && cloudResult.hash && cacheItem.hash !== cloudResult.hash) {
                    hasChanges = true;
                }

                const params = new URLSearchParams({
                    action: 'loadGlobal',
                    classId: CACHE_CONFIG.CLASS_ID,
                    token: 'homework2025',
                    _t: Date.now()
                });
                const globalResponse = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, { cache: 'no-store' });
                if (globalResponse.ok) {
                    const globalResult = await globalResponse.json();
                    if (globalResult.success && globalResult.data) {
                        const fetchedString = typeof globalResult.data === 'string' ? globalResult.data : JSON.stringify(globalResult.data);
                        if (currentGlobalDataString !== null && currentGlobalDataString !== fetchedString) {
                            hasChanges = true;
                        }
                    }
                }

                if (hasChanges) {
                    showBackgroundUpdateNotification();
                }
            } catch (error) {
            } finally {
                isBackgroundUpdating = false;
            }
        }

        // ================= 作業清單拖曳功能 =================
        let draggedElement = null, draggedHomeworkId = null;
        function handleDragStart(e) {
            const item = e.target.closest('.sortable-item');
            if (!item) return;
            draggedElement = item; draggedHomeworkId = item.dataset.homeworkId;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedHomeworkId);
        }
        function handleDragEnd(e) {
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
                draggedElement.setAttribute('draggable', 'false'); 
            }
            document.querySelectorAll('.sortable-item').forEach(i => i.classList.remove('drag-over'));
            draggedElement = null; draggedHomeworkId = null;
        }
        function handleDragOver(e) {
            e.preventDefault(); e.stopPropagation();
            if (!draggedElement) return;
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.sortable-item');
            if (target && target !== draggedElement) {
                document.querySelectorAll('.sortable-item').forEach(i => i.classList.remove('drag-over'));
                target.classList.add('drag-over');
            }
        }
        function handleDrop(e) {
            e.preventDefault(); e.stopPropagation();
            if (!draggedElement || !draggedHomeworkId) return;
            const target = e.target.closest('.sortable-item');
            if (target && target !== draggedElement) {
                const targetId = target.dataset.homeworkId;
                const draggedIdx = homeworkData.findIndex(hw => hw.id === draggedHomeworkId);
                const targetIdx = homeworkData.findIndex(hw => hw.id === targetId);
                if (draggedIdx > -1 && targetIdx > -1) {
                    const item = homeworkData.splice(draggedIdx, 1)[0];
                    homeworkData.splice(targetIdx, 0, item);
                    item.timestamp = new Date().toISOString();
                    renderAllHomework();
                }
            }
            document.querySelectorAll('.sortable-item').forEach(i => i.classList.remove('drag-over'));
        }

        async function saveGlobalEventsInstantly() {
            try {
                const dataToSave = { events: globalEvents, config: globalConfig };
                const formData = new FormData();
                formData.append('action', 'saveGlobal');
                formData.append('classId', CACHE_CONFIG.CLASS_ID);
                formData.append('data', JSON.stringify(dataToSave));
                formData.append('token', 'homework2025');

                const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData, cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                currentGlobalDataString = JSON.stringify(dataToSave);
            } catch (e) {
                console.error('儲存全域跑馬燈失敗:', e);
            }
        }

        async function loadGlobalEvents() {
            try {
                const params = new URLSearchParams({
                    action: 'loadGlobal',
                    classId: CACHE_CONFIG.CLASS_ID,
                    token: 'homework2025',
                    _t: Date.now()
                });

                const response = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const result = await response.json();
                if (result.success && result.data) {
                    const parsedData = parseRawData(result.data);
                    const safeObj = (parsedData && typeof parsedData === 'object' && !Array.isArray(parsedData)) ? parsedData : {};
                    
                    currentGlobalDataString = typeof result.data === 'string' ? result.data : JSON.stringify(result.data);

                    if (safeObj.events) globalEvents = safeObj.events;
                    if (safeObj.config) {
                        globalConfig = safeObj.config;
                        let speed = parseInt(globalConfig.marqueeSpeed, 10);
                        globalConfig.marqueeSpeed = (isNaN(speed) || speed < 150) ? 200 : (speed > 400 ? 400 : speed);
                    }

                    updateCountdown(new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate()).getTime());
                    
                    if (editMode) {
                        renderGlobalEventsEditor();
                        const slider = document.getElementById('marqueeSpeedSlider');
                        const display = document.getElementById('speedValueDisplay');
                        if (slider && display) {
                            slider.value = globalConfig.marqueeSpeed;
                            display.textContent = globalConfig.marqueeSpeed + 's';
                        }
                    }
                }
            } catch (e) {
                console.log('無法載入獨立跑馬燈設定。', e);
            }
        }

        // 【終極修復：手動建構標準格式字串並確保攜帶 userAgent】
        async function saveToGoogleSheets(dateKey, data) {
            try {
                const formData = new FormData();
                formData.append('action', 'save');
                formData.append('dateKey', dateKey);
                formData.append('classId', CACHE_CONFIG.CLASS_ID);
                formData.append('data', JSON.stringify(data));
                formData.append('token', 'homework2025');
                
                // 強制轉換為 YYYY-MM-DD HH:mm:ss 以阻絕 Google Sheets 自動切換為中文格式
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                const ts = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                formData.append('timestamp', ts); 
                
                // 確保 userAgent 欄位不會遺失
                formData.append('userAgent', navigator.userAgent);

                const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData, cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const responseText = await response.text();
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (e) {
                    if (responseText.toLowerCase().includes('success')) {
                        result = { success: true };
                    } else {
                        throw new Error('伺服器回傳格式錯誤');
                    }
                }
                
                if (result.success || result.status === 'success') return { success: true, message: '作業已成功儲存' };
                else throw new Error(result.error || '儲存失敗');
            } catch (e) { return { success: false, message: e.message }; }
        }

        async function loadFromCloudWithCache(dateKey, isPrefetch = false) {
            if (inflightRequests.has(dateKey)) return await inflightRequests.get(dateKey);
            
            const loadPromise = (async () => {
                let controller = new AbortController();
                let timeoutId = setTimeout(() => controller.abort(), 15000);
                if (!isPrefetch) {
                    showSyncStatus(true, '載入中...');
                    if (currentLoadController) currentLoadController.abort();
                    currentLoadController = controller;
                }
                try {
                    const params = new URLSearchParams({ action: 'load', dateKey, classId: CACHE_CONFIG.CLASS_ID, token: 'homework2025', _t: Date.now() });
                    const response = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, { signal: controller.signal, cache: 'no-store' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const result = await response.json();
                    if (result.success || result.data) {
                        let rawData = result.data || [];
                        const normalizedData = normalizeHomeworkData(rawData);
                        const hash = result.hash || calculateStableHash(rawData);
                        writeToCache(dateKey, normalizedData, hash);
                        return { data: normalizedData, hash, fromCloud: true };
                    } else throw new Error(result.error || '載入失敗');
                } catch (e) {
                    if (e.name === 'AbortError') throw e; 
                    throw e; 
                } finally {
                    clearTimeout(timeoutId);
                    if (!isPrefetch) {
                        showSyncStatus(false);
                        if (currentLoadController === controller) currentLoadController = null;
                    }
                }
            })();
            
            inflightRequests.set(dateKey, loadPromise);
            try { return await loadPromise; } finally { inflightRequests.delete(dateKey); }
        }

        // 【讀取端防呆機制：跨裝置日期差異雙重搜捕】
        async function loadHomeworkWithSWR(dateKey) {
            let cacheItem = getFromMemoryCache(dateKey) || getFromLocalStorage(dateKey);
            if (cacheItem && cacheItem.data) {
                if (dateKeyISO(currentDate) === dateKey) { homeworkData = [...cacheItem.data]; renderAllHomework(); }
            } else { homeworkData = []; renderAllHomework(true); }
            
            try {
                let cloudResult = await loadFromCloudWithCache(dateKey);
                
                // --- 舊資料與跨裝置救援機制：若用原本的鍵值找不到，自動生成另一個有補零/無補零的鍵值進行備援搜捕 ---
                if (!cloudResult || !cloudResult.data || cloudResult.data.length === 0) {
                    const padMonth = String(currentDate.getMonth() + 1).padStart(2, '0');
                    const padDay = String(currentDate.getDate()).padStart(2, '0');
                    const unpadMonth = currentDate.getMonth() + 1;
                    const unpadDay = currentDate.getDate();
                    
                    const paddedKey = `${currentDate.getFullYear()}-${padMonth}-${padDay}`;
                    const unpaddedKey = `${currentDate.getFullYear()}-${unpadMonth}-${unpadDay}`;
                    
                    let targetFallback = (dateKey === paddedKey) ? unpaddedKey : paddedKey;
                    
                    try {
                        const fallbackResult = await loadFromCloudWithCache(targetFallback, true);
                        if (fallbackResult && fallbackResult.data && fallbackResult.data.length > 0) {
                            cloudResult = fallbackResult;
                        }
                    } catch(e) {}
                }
                
                if (dateKeyISO(currentDate) !== dateKey) return; 
                
                if ((!cacheItem || cacheItem.hash !== cloudResult.hash) && cloudResult.data !== undefined) {
                    homeworkData = [...cloudResult.data]; renderAllHomework();
                }
            } catch (e) {
                if (dateKeyISO(currentDate) !== dateKey) return; 
                if (!cacheItem) { homeworkData = []; renderAllHomework(); }
            }
        }

        async function saveHomeworkInstantly() {
            if (isSaving) return { success: false, message: '正在儲存中' };
            isSaving = true;
            try {
                const dateKey = dateKeyISO(currentDate);
                const legacyData = homeworkData.map(hw => ({ text: hw.content, subject: hw.subject, confirmed: hw.status === 'confirmed', timestamp: hw.timestamp }));
                try { localStorage.setItem(dateKey, JSON.stringify(legacyData)); } catch (e) {}
                const result = await saveToGoogleSheets(dateKey, legacyData);
                if (result.success) writeToCache(dateKey, normalizeHomeworkData(legacyData));
                return result;
            } finally { isSaving = false; }
        }

        async function loadHomework() { await loadHomeworkWithSWR(dateKeyISO(currentDate)); }

        async function toggleEditMode() {
            if (!editMode) { showCustomPasswordDialog(); return; }

            homeworkData.forEach(hw => {
                if (hw.status === 'editing') {
                    if (hw.content.trim()) hw.status = 'confirmed';
                    else homeworkData = homeworkData.filter(h => h.id !== hw.id);
                }
            });

            showSavingDialog('正在同步作業與跑馬燈至雲端...');
            setEditBtnBusy(true);

            let saveResult;
            try {
                saveResult = await saveHomeworkInstantly();
                await saveGlobalEventsInstantly(); 
            } catch (e) {
                saveResult = { success: false, message: '儲存錯誤' };
            }

            hideSavingDialog();
            setEditBtnBusy(false);

            if (saveResult && saveResult.success) {
                editMode = false;
                updateEditModeUI();
                showNotification('儲存完成，即將載入...', 'success');
                setTimeout(async () => { await forceReloadHomework(); showNotification('資料已更新！', 'success'); }, 2000);
            } else { showNotification(saveResult?.message || '儲存失敗', 'error'); }
        }

        function updateEditModeUI() {
            const btn = document.getElementById('editModeBtn');
            if (editMode) {
                document.getElementById('editIcon').textContent = '🔓'; document.getElementById('editText').textContent = '退出編輯';
                btn.className = 'group relative w-full sm:w-auto bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white px-4 py-2 rounded-xl shadow-lg flex justify-center items-center space-x-2';
                document.getElementById('addHomeworkBtn').style.display = 'flex';
                document.getElementById('marqueeEditSection').style.display = 'block';
                document.getElementById('sortModeIndicator').style.display = 'block';
                renderGlobalEventsEditor(); stopBackgroundUpdate();
            } else {
                document.getElementById('editIcon').textContent = '🔐'; document.getElementById('editText').textContent = '編輯模式';
                btn.className = 'group relative w-full sm:w-auto bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-4 py-2 rounded-xl shadow-lg flex justify-center items-center space-x-2';
                document.getElementById('addHomeworkBtn').style.display = 'none';
                document.getElementById('marqueeEditSection').style.display = 'none';
                document.getElementById('sortModeIndicator').style.display = 'none';
                startBackgroundUpdate();
            }
        }

        function showCustomPasswordDialog() {
            const overlay = document.createElement('div');
            overlay.className = 'password-dialog-overlay';
            overlay.innerHTML = `<div class="bg-white rounded-xl p-6 shadow-2xl max-w-sm w-full mx-4"><h3 class="text-xl font-bold text-center mb-4">🔐 請輸入密碼</h3><input type="password" id="customPasswordInput" placeholder="請輸入密碼..." class="w-full border border-gray-300 rounded-lg p-3 text-center text-lg font-medium mb-4 outline-none"><div class="flex gap-3"><button onclick="document.querySelector('.password-dialog-overlay').remove()" class="flex-1 bg-gray-500 text-white py-2 rounded-lg font-medium">取消</button><button onclick="confirmPassword()" class="flex-1 bg-indigo-500 text-white py-2 rounded-lg font-medium">確認</button></div></div>`;
            document.body.appendChild(overlay);
            setTimeout(() => { const i = document.getElementById('customPasswordInput'); i.focus(); i.onkeypress = e => { if(e.key==='Enter') confirmPassword(); }; }, 100);
        }

        function confirmPassword() {
            const input = document.getElementById('customPasswordInput');
            if (input?.value === '0944') {
                editMode = true; updateEditModeUI(); document.querySelector('.password-dialog-overlay').remove();
                showNotification('已進入編輯模式', 'success'); renderAllHomework();
            } else { showNotification('密碼錯誤！', 'error'); input.value = ''; input.focus(); }
        }

        function setEditBtnBusy(busy) {
            const btn = document.getElementById('editModeBtn');
            btn.disabled = busy;
            btn.querySelector('[data-role="btn-content"]').classList.toggle('hidden', busy);
            btn.querySelector('[data-role="spinner"]').classList.toggle('hidden', !busy);
        }

        async function forceReloadHomework() {
            const dateKey = dateKeyISO(currentDate);
            memoryCache.delete(getCacheKey(dateKey));
            try { localStorage.removeItem(getCacheKey(dateKey)); localStorage.removeItem(dateKey); } catch (e) {}
            showNotification('正在重新載入雲端資料...', 'success');
            
            try {
                if (currentLoadController) currentLoadController.abort();
                let cloudResult = await loadFromCloudWithCache(dateKey);
                
                // --- 舊資料與跨裝置救援機制 ---
                if (!cloudResult || !cloudResult.data || cloudResult.data.length === 0) {
                    const padMonth = String(currentDate.getMonth() + 1).padStart(2, '0');
                    const padDay = String(currentDate.getDate()).padStart(2, '0');
                    const unpadMonth = currentDate.getMonth() + 1;
                    const unpadDay = currentDate.getDate();
                    
                    const paddedKey = `${currentDate.getFullYear()}-${padMonth}-${padDay}`;
                    const unpaddedKey = `${currentDate.getFullYear()}-${unpadMonth}-${unpadDay}`;
                    
                    let targetFallback = (dateKey === paddedKey) ? unpaddedKey : paddedKey;
                    
                    try {
                        const fallbackResult = await loadFromCloudWithCache(targetFallback, true);
                        if (fallbackResult && fallbackResult.data && fallbackResult.data.length > 0) {
                            cloudResult = fallbackResult;
                        }
                    } catch(e) {}
                }
                
                if (dateKeyISO(currentDate) === dateKey) {
                    homeworkData = [...cloudResult.data]; renderAllHomework();
                    await loadGlobalEvents(); 
                    showNotification('資料已重新載入！', 'success');
                }
            } catch (e) { 
                if (e.name !== 'AbortError') showNotification('載入失敗，請稍後重試', 'error');
                if (dateKeyISO(currentDate) === dateKey) {
                    homeworkData = []; renderAllHomework(); 
                }
            }
        }

        function updateCountdown(currentDayTime) {
            const countdownMarquee = document.getElementById('countdownMarquee');
            const marqueeText = document.getElementById('marqueeText');
            if (!globalEvents || globalEvents.length === 0) { countdownMarquee.style.display = 'none'; return; }

            let msgs = [];
            for (const ev of globalEvents) {
                if (ev.enabled === false) continue;
                if (ev.type === 'message' && ev.content?.trim()) { msgs.push(`📢 ${ev.content}`); } 
                else if (ev.type === 'countdown' && ev.date && ev.name) {
                    const [y, m, d] = ev.date.split('-');
                    const evDate = new Date(parseInt(y), parseInt(m)-1, parseInt(d), 12, 0, 0).getTime();
                    const eDay = new Date(new Date(evDate).getFullYear(), new Date(evDate).getMonth(), new Date(evDate).getDate()).getTime();
                    const tDay = new Date(new Date(currentDayTime).getFullYear(), new Date(currentDayTime).getMonth(), new Date(currentDayTime).getDate()).getTime();
                    if (eDay >= tDay) {
                        const days = Math.floor((eDay - tDay) / 86400000);
                        if (days === 0) msgs.push(`📢 🌟 提醒：【${ev.name}】就是今天！祝大家順利！ 💪 🌟`);
                        else msgs.push(`📢 提醒：距離【${ev.name}】還剩下 <span class="text-2xl text-red-500 font-black mx-2">${days}</span> 天！`);
                    }
                }
            }

            if (msgs.length > 0) {
                countdownMarquee.style.display = 'flex';
                const baseMsg = msgs.join('<span class="mx-8 text-yellow-400 font-normal">|</span>') + '<span class="mx-8 text-yellow-400 font-normal">|</span>';
                
                const rawText = baseMsg.replace(/<[^>]*>?/gm, '');
                const charCount = rawText.length || 1;
                
                const copies = 20;
                const crossedCopies = copies / 2;
                const totalCrossedChars = charCount * crossedCopies;
                
                const speedSetting = Math.max(150, Math.min(400, globalConfig.marqueeSpeed || 200));
                
                const referenceChars = 300;
                const calculatedDuration = (totalCrossedChars / referenceChars) * speedSetting;

                const repeatedMsg = Array(copies).fill(baseMsg).join('');
                const groupHTML = `<div class="marquee-item-group">${repeatedMsg}</div>`;
                
                marqueeText.className = 'marquee-content text-base sm:text-lg font-bold text-yellow-800';
                marqueeText.style.animationDuration = `${calculatedDuration}s`;
                marqueeText.innerHTML = groupHTML + groupHTML;
            } else { countdownMarquee.style.display = 'none'; }
        }

        function updateDateDisplaySync() {
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            let semInfo = '', weekNum = 1;
            const stripTime = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
            const curr = stripTime(currentDate), s1Start = stripTime(firstSemesterStart), s1End = stripTime(firstSemesterEnd), s2Start = stripTime(secondSemesterStart), s2End = stripTime(secondSemesterEnd);

            if (curr >= s1Start && curr <= s1End) {
                semInfo = '114學年第一學期';
                weekNum = Math.max(1, Math.min(22, Math.floor((curr - new Date(2025, 7, 31).getTime()) / 86400000 / 7) + 1));
            } else if (curr >= s2Start && curr <= s2End) {
                semInfo = '114學年第二學期';
                weekNum = Math.max(1, Math.min(22, Math.floor((curr - new Date(2026, 1, 8).getTime()) / 86400000 / 7) + 1));
            } else if (curr < s1Start) { semInfo = '114學年第一學期'; } 
            else if (curr > s1End && curr < s2Start) { semInfo = '114學年寒假'; } 
            else { semInfo = '114學年暑假'; }

            document.getElementById('semesterInfo').textContent = semInfo;
            document.getElementById('weekInfo').textContent = `第${weekNum}週`;
            document.getElementById('dateOnly').textContent = `${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月${currentDate.getDate()}日`;
            document.getElementById('weekdayOnly').textContent = weekdays[currentDate.getDay()];
            
            updateCountdown(curr);
        }

        function updateDateDisplay() {
            updateDateDisplaySync();
            requestAnimationFrame(() => loadHomework().catch(e => console.error(e)));
        }

        let navLocked = false;
        function moveDay(step) {
            if (navLocked) return; navLocked = true; setTimeout(() => navLocked = false, 300);
            do {
                currentDate.setDate(currentDate.getDate() + step);
                if (currentDate < firstSemesterStart) { currentDate = new Date(firstSemesterStart); break; }
                if (currentDate > secondSemesterEnd) { currentDate = new Date(secondSemesterEnd); break; }
            } while (currentDate.getDay() === 0 || currentDate.getDay() === 6);
            updateDateDisplay();
        }
        function previousDay() { moveDay(-1); }
        function nextDay() { moveDay(1); }
        function today() {
            if (navLocked) return; navLocked = true; setTimeout(() => navLocked = false, 300);
            currentDate = new Date(); updateDateDisplay();
        }

        function showDatePicker() {
            const overlay = document.createElement('div'); overlay.className = 'date-picker-overlay';
            overlay.innerHTML = `<div class="date-picker-dialog"><h3 class="text-xl font-bold mb-4">📅 選擇日期</h3><input type="date" id="datePickerInput" class="date-picker-input" value="${dateKeyISO(currentDate)}" min="${dateKeyISO(firstSemesterStart)}" max="${dateKeyISO(secondSemesterEnd)}"><div class="flex gap-3"><button onclick="document.querySelector('.date-picker-overlay').remove()" class="flex-1 bg-gray-500 text-white py-2 rounded-lg">取消</button><button onclick="confirmDatePicker()" class="flex-1 bg-indigo-500 text-white py-2 rounded-lg">確認</button></div></div>`;
            document.body.appendChild(overlay);
        }

        async function confirmDatePicker() {
            const input = document.getElementById('datePickerInput');
            if (!input?.value) return showNotification('請選擇有效日期！', 'warning');
            const d = new Date(input.value + 'T12:00:00');
            if (d < firstSemesterStart || d > secondSemesterEnd) return showNotification('所選日期超出學期範圍！', 'warning');
            if (d.getDay() === 0 || d.getDay() === 6) return showNotification('週末沒有上課，請選擇平日！', 'warning');
            
            currentDate = d; document.querySelector('.date-picker-overlay')?.remove();
            showNotification('正在載入所選日期...', 'success'); await updateDateDisplay();
        }

        window.addEventListener('load', () => {
            currentDate = new Date();
            updateDateDisplay();
            loadGlobalEvents(); 
            startBackgroundUpdate();
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && !editMode) setTimeout(performBackgroundUpdate, 1000);
            });
        });
    </script>
